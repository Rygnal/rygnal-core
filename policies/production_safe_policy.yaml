policy_version: policy.v2
default_decision: require_approval
rules:
  - id: block-critical-risk
    priority: 5
    risk_level: critical
    decision: block
    severity: critical
    reason: "Critical-risk actions are blocked in production-safe mode."

  - id: block-high-risk-score
    priority: 10
    risk_score_min: 85
    decision: block
    severity: critical
    reason: "High risk-score actions are blocked in production-safe mode."

  - id: block-env-read
    priority: 20
    tool_name: file_read
    target_contains: ".env"
    decision: block
    severity: high
    reason: "Reading environment secret files is not allowed."

  - id: block-dangerous-shell
    priority: 30
    tool_name: shell_command
    input_contains: "rm -rf"
    decision: block
    severity: critical
    reason: "Dangerous shell command detected."

  - id: require-approval-for-file-delete
    priority: 40
    tool_name: file_delete
    decision: require_approval
    severity: high
    reason: "File deletion requires human approval in production-safe mode."

  - id: simulate-external-api-send
    priority: 50
    tool_name: external_api_send
    decision: simulate
    severity: medium
    reason: "External API sends are simulated in production-safe mode."
